<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cove — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 16px; border: 1px solid #e5e5e5; padding: 40px; width: 100%; max-width: 380px; text-align: center; }
  .logo { font-size: 48px; margin-bottom: 12px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
  .sub { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
  input { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; outline: none; transition: border 0.15s; margin-bottom: 12px; }
  input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  button { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #93c5fd; cursor: not-allowed; }
  .error { color: #dc2626; font-size: 13px; margin-top: 10px; min-height: 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌊</div>
  <h1>Cove</h1>
  <p class="sub">Your personal cloud</p>
  <input type="password" id="password" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
  <button id="btn" onclick="login()">Sign in</button>
  <div class="error" id="error"></div>
</div>
<script>
async function login() {
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn');
  const error = document.getElementById('error');
  if (!password) return;

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  error.textContent = '';

  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password })
  });

  if (res.ok) {
    window.location.href = '/';
  } else {
    error.textContent = 'Wrong password. Try again.';
    btn.disabled = false;
    btn.textContent = 'Sign in';
    document.getElementById('password').select();
  }
}
</script>
</body>
</html>
